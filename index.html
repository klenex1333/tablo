<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Табло матча</title>
<style>
body{font-family:Arial,sans-serif;background:#1a1a1a;color:#fff;text-align:center;padding:20px;margin:0}
.container{display:flex;justify-content:center;gap:40px;margin-bottom:30px}
.panel{padding:25px;border-radius:15px;width:280px;box-shadow:0 10px 20px rgba(0,0,0,.4);transition:background .3s}
.blue-team{background:#0d47a1;border:3px solid #1e88e5}
.red-team{background:#b71c1c;border:3px solid #e53935}
.settings-group{margin-bottom:15px;display:flex;flex-direction:column;gap:8px;align-items:center}
.team-input{width:85%;padding:8px;font-size:16px;border:none;border-radius:5px;text-align:center;font-weight:bold}
.color-picker-wrapper{display:flex;align-items:center;gap:10px;font-size:14px}
.color-picker{border:none;width:40px;height:30px;border-radius:5px;cursor:pointer;background:none}
.score-display{font-size:80px;font-weight:bold;margin:15px 0;font-family:monospace}
.btn-group{display:flex;justify-content:center;gap:10px}
button{padding:12px 20px;font-size:18px;font-weight:bold;cursor:pointer;border:none;border-radius:8px;transition:transform .1s}
button:active{transform:scale(.95)}
.btn-plus{background:#4caf50;color:#fff;width:60px}
.btn-minus{background:#f44336;color:#fff;width:60px}
.control-buttons{margin-top:30px}
.btn-reset{background:#555;color:#fff;padding:15px 40px;font-size:20px}
.btn-stream{background:#ff9800;color:#000;padding:15px 30px;font-size:20px;margin-right:15px}

/* Режим стрима / Окно зрителей */
.stream-mode {background:#000;padding:0;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.stream-container {display:flex;width:100vw;height:100vh}
.stream-side {flex:1;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;height:100%;transition:background .2s;box-sizing:border-box;padding:4vh 3vw;width:50vw;overflow:hidden}

/* Стили для автотекста (Важное изменение) */
.stream-team-name {
    width: 100%;
    text-align: center;
    white-space: nowrap; /* Запрещаем перенос слов */
    font-weight: bold;
    display: inline-block;
}
.stream-score {
    font-weight: bold;
    font-family: monospace;
}
</style>
</head>
<body>

<!-- Панель управления (скрывается в режиме стрима) -->
<div id="admin-panel">
    <div class="container">
        <div class="panel blue-team" id="panel1">
            <div class="settings-group">
                <input type="text" class="team-input" id="name1" value="КОМАНДА СИНГ">
                <div class="color-picker-wrapper">
                    Цвет: <input type="color" class="color-picker" id="color1" value="#0d47a1">
                </div>
            </div>
            <div class="score-display" id="score-val1">0</div>
            <div class="btn-group">
                <button class="btn-minus" onclick="changeScore(1, -1)">-</button>
                <button class="btn-plus" onclick="changeScore(1, 1)">+</button>
            </div>
        </div>
        
        <div class="panel red-team" id="panel2">
            <div class="settings-group">
                <input type="text" class="team-input" id="name2" value="АДМИНИСТРАТ">
                <div class="color-picker-wrapper">
                    Цвет: <input type="color" class="color-picker" id="color2" value="#b71c1c">
                </div>
            </div>
            <div class="score-display" id="score-val2">0</div>
            <div class="btn-group">
                <button class="btn-minus" onclick="changeScore(2, -1)">-</button>
                <button class="btn-plus" onclick="changeScore(2, 1)">+</button>
            </div>
        </div>
    </div>
    <div class="control-buttons">
        <button class="btn-stream" onclick="toggleStreamMode()">Режим зрителей</button>
        <button class="btn-reset" onclick="resetScore()">Сброс</button>
    </div>
</div>

<!-- Экран зрителей (по умолчанию скрыт, включается кнопкой) -->
<div id="stream-view" style="display: none;">
    <div class="stream-container">
        <div class="stream-side" id="view-side1">
            <div class="stream-team-name" id="view-name1">КОМАНДА СИНГ</div>
            <div class="stream-score" id="view-score1">0</div>
        </div>
        <div class="stream-side" id="view-side2">
            <div class="stream-team-name" id="view-name2">АДМИНИСТРАТ</div>
            <div class="stream-score" id="view-score2">0</div>
        </div>
    </div>
</div>

<script>
// Данные табло
let scores = { 1: 0, 2: 0 };

function changeScore(team, val) {
    scores[team] = Math.max(0, scores[team] + val);
    document.getElementById(`score-val${team}`).innerText = scores[team];
    document.getElementById(`view-score${team}`).innerText = scores[team];
}

function resetScore() {
    scores[1] = 0;
    scores[2] = 0;
    changeScore(1, 0);
    changeScore(2, 0);
}

// Переключение режимов
function toggleStreamMode() {
    const admin = document.getElementById('admin-panel');
    const stream = document.getElementById('stream-view');
    
    // Обновляем данные перед показом
    document.getElementById('view-name1').innerText = document.getElementById('name1').value;
    document.getElementById('view-name2').innerText = document.getElementById('name2').value;
    document.getElementById('view-side1').style.background = document.getElementById('color1').value;
    document.getElementById('view-side2').style.background = document.getElementById('color2').value;
    
    admin.style.display = 'none';
    stream.style.display = 'block';
    document.body.classList.add('stream-mode');
    
    // Запускаем подгонку шрифтов
    initAutoFontResize();
}

// Скрипт автоматического изменения размера текста под ширину экрана
function initAutoFontResize() {
    const elements = document.querySelectorAll('.stream-team-name, .stream-score');
    
    const resizeObserver = new ResizeObserver(entries => {
        for (let entry of entries) {
            const el = entry.target;
            const parent = el.parentElement;
            
            // Сбрасываем размер для расчетов
            el.style.fontSize = '10px'; 
            
            // Вычисляем максимально доступные размеры (с запасом на отступы)
            const maxW = parent.clientWidth * 0.85; 
            const maxH = parent.clientHeight * 0.35; 
            
            let fontSize = 10;
            
            // Шаг увеличения шрифта пока текст помещается в рамки
            while (el.scrollWidth < maxW && el.scrollHeight < maxH && fontSize < 200) {
                fontSize += 2;
                el.style.fontSize = fontSize + 'px';
            }
            
            // Чуть уменьшаем, чтобы избежать пограничных багов
            el.style.fontSize = (fontSize - 4) + 'px';
        }
    });

    elements.forEach(el => resizeObserver.observe(el));
}

// Возврат в меню по кнопке Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.body.classList.contains('stream-mode')) {
        document.getElementById('admin-panel').style.display = 'block';
        document.getElementById('stream-view').style.display = 'none';
        document.body.classList.remove('stream-mode');
    }
});
</script>
</body>
</html>
