<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Табло матча — Панель управления</title>
<style>
body{font-family:Arial,sans-serif;background:#1a1a1a;color:#fff;text-align:center;padding:20px;margin:0}
.container{display:flex;justify-content:center;gap:40px;margin-bottom:30px}
.panel{padding:25px;border-radius:15px;width:280px;box-shadow:0 10px 20px rgba(0,0,0,.4);transition:background .3s}
.blue-team{background:#0d47a1;border:3px solid #1e88e5}
.red-team{background:#b71c1c;border:3px solid #e53935}
.settings-group{margin-bottom:15px;display:flex;flex-direction:column;gap:8px;align-items:center}
.team-input{width:85%;padding:8px;font-size:16px;border:none;border-radius:5px;text-align:center;font-weight:bold}
.color-picker-wrapper{display:flex;align-items:center;gap:10px;font-size:14px}
.color-picker{border:none;width:40px;height:30px;border-radius:5px;cursor:pointer;background:none}
.score-display{font-size:80px;font-weight:bold;margin:15px 0;font-family:monospace}
.btn-group{display:flex;justify-content:center;gap:10px}
button{padding:12px 20px;font-size:18px;font-weight:bold;cursor:pointer;border:none;border-radius:8px;transition:transform .1s}
button:active{transform:scale(.95)}
.btn-plus{background:#4caf50;color:#fff;width:60px}
.btn-minus{background:#f44336;color:#fff;width:60px}
.control-buttons{margin-top:30px}
.btn-reset{background:#555;color:#fff;padding:15px 40px;font-size:20px}
.btn-stream{background:#ff9800;color:#000;padding:15px 30px;font-size:20px;margin-right:15px}

/* Стили для новых ползунков размера */
.size-slider-wrapper {display:flex; flex-direction:column; width:85%; gap:4px; font-size:13px; margin-top:5px;}
.size-slider {width:100%; cursor:pointer;}
</style>
</head>
<body>

<div id="admin-panel">
    <div class="container">
        <!-- Синяя команда -->
        <div class="panel blue-team" id="panel1">
            <div class="settings-group">
                <input type="text" class="team-input" id="name1" value="КОМАНДА СИН" oninput="updateStreamData()">
                <div class="color-picker-wrapper">
                    Цвет: <input type="color" class="color-picker" id="color1" value="#0d47a1" onchange="updateStreamData()">
                </div>
                <!-- Ползунок размера текста для 1-й команды -->
                <div class="size-slider-wrapper">
                    Размер текста: <input type="range" class="size-slider" id="size1" min="20" max="150" value="60" oninput="updateStreamData()">
                </div>
            </div>
            <div class="score-display" id="score-val1">0</div>
            <div class="btn-group">
                <button class="btn-minus" onclick="changeScore(1, -1)">-</button>
                <button class="btn-plus" onclick="changeScore(1, 1)">+</button>
            </div>
        </div>
        
        <!-- Красная команда -->
        <div class="panel red-team" id="panel2">
            <div class="settings-group">
                <input type="text" class="team-input" id="name2" value="АДМИНИСТРАТ" oninput="updateStreamData()">
                <div class="color-picker-wrapper">
                    Цвет: <input type="color" class="color-picker" id="color2" value="#b71c1c" onchange="updateStreamData()">
                </div>
                <!-- Ползунок размера текста для 2-й команды -->
                <div class="size-slider-wrapper">
                    Размер текста: <input type="range" class="size-slider" id="size2" min="20" max="150" value="60" oninput="updateStreamData()">
                </div>
            </div>
            <div class="score-display" id="score-val2">0</div>
            <div class="btn-group">
                <button class="btn-minus" onclick="changeScore(2, -1)">-</button>
                <button class="btn-plus" onclick="changeScore(2, 1)">+</button>
            </div>
        </div>
    </div>
    
    <div class="control-buttons">
        <button class="btn-stream" onclick="openStreamWindow()">Открыть окно зрителей</button>
        <button class="btn-reset" onclick="resetScore()">Сброс</button>
    </div>
</div>

<script>
let scores = { 1: 0, 2: 0 };
let streamWindow = null;

function changeScore(team, val) {
    scores[team] = Math.max(0, scores[team] + val);
    document.getElementById(`score-val${team}`).innerText = scores[team];
    updateStreamData(); 
}

function resetScore() {
    scores[1] = 0;
    scores[2] = 0;
    document.getElementById('score-val1').innerText = 0;
    document.getElementById('score-val2').innerText = 0;
    updateStreamData();
}

// Передача всех параметров во второе окно (названия, цвета, счет и размеры шрифтов)
function updateStreamData() {
    if (!streamWindow || streamWindow.closed) return;

    const n1 = document.getElementById('name1').value;
    const n2 = document.getElementById('name2').value;
    const c1 = document.getElementById('color1').value;
    const c2 = document.getElementById('color2').value;
    
    // Получаем значения ползунков
    const fontSize1 = document.getElementById('size1').value + 'px';
    const fontSize2 = document.getElementById('size2').value + 'px';

    const sDoc = streamWindow.document;
    
    if (sDoc.getElementById('view-name1')) {
        sDoc.getElementById('view-name1').innerText = n1;
        sDoc.getElementById('view-name2').innerText = n2;
        
        sDoc.getElementById('view-score1').innerText = scores[1];
        sDoc.getElementById('view-score2').innerText = scores[2];
        
        sDoc.getElementById('view-side1').style.backgroundColor = c1;
        sDoc.getElementById('view-side2').style.backgroundColor = c2;
        
        // Применяем размер шрифта из ползунков напрямую
        sDoc.getElementById('view-name1').style.fontSize = fontSize1;
        sDoc.getElementById('view-name2').style.fontSize = fontSize2;
    }
}

function openStreamWindow() {
    if (streamWindow && !streamWindow.closed) {
        streamWindow.focus();
        return;
    }

    streamWindow = window.open("", "StreamViewport", "width=1280,height=720,resizable=yes");
    
    // Чистая разметка второго окна зрителей на основе ваших изначальных стилей (.stream-side, .stream-bl)
    const htmlContent = `
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>Табло матча (Экран зрителей)</title>
        <style>
            body {
                background: #000; margin: 0; padding: 0; overflow: hidden; 
                height: 100vh; font-family: Arial, sans-serif; color: #fff;
            }
            .stream-container { display: flex; width: 100vw; height: 100vh; }
            .stream-side {
                flex: 1; display: flex; flex-direction: column; 
                align-items: center; justify-content: space-evenly; 
                height: 100%; transition: background .2s; 
                box-sizing: border-box; padding: 4vh 3vw; width: 50vw; overflow: hidden;
            }
            .stream-team-name {
                width: 100%; text-align: center; 
                white-space: nowrap; font-weight: bold; display: inline-block;
            }
            /* Стили для счета из вашего изначального стиля .score-display */
            .stream-score { font-size: 20vh; font-weight: bold; font-family: monospace; }
        </style>
    </head>
    <body>
        <div class="stream-container">
            <div class="stream-side" id="view-side1">
                <div class="stream-team-name" id="view-name1"></div>
                <div class="stream-score" id="view-score1">0</div>
            </div>
            <div class="stream-side" id="view-side2">
                <div class="stream-team-name" id="view-name2"></div>
                <div class="stream-score" id="view-score2">0</div>
            </div>
        </div>
    </body>
    </html>
    `;

    streamWindow.document.write(htmlContent);
    streamWindow.document.close();

    // Сразу же отправляем текущие настройки в новое окно
    setTimeout(updateStreamData, 50);
}

// Автоматическое закрытие окна зрителей при закрытии админки
window.onbeforeunload = function() {
    if (streamWindow && !streamWindow.closed) {
        streamWindow.close();
    }
};
</script>
</body>
</html>
